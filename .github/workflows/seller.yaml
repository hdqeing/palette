name: Seller UI

on:
  workflow_dispatch:

jobs:
  build_and_deploy_react_app:
    runs-on: ubuntu-latest
    name: Build React App and Deploy on Azure Static Web App
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: upload
          app_location: "seller"
          azure_static_web_apps_api_token: ${{ secrets.SELLER_UI_AZURE_STATIC_WEB_APPS_API_TOKEN }}
          output_location: "build/client"
          app_build_command: "npm run build"
          skip_api_build: true
