name: Admin UI

on:
  workflow_dispatch:

jobs:
  build_and_deploy_react_app:
    runs-on: ubuntu-latest
    name: Build React App and Deploy on Azure Static Web App
    defaults:
      run:
        working-directory: admin
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 23

      - name: Install dependencies
        run: npm ci
      
      - name: Build app
        env:
          VITE_API_URL: https://api.palletly.de
          VITE_AZURE_CLIENT_ID: 02d84ec3-f7fd-46d0-994a-9f2f1f81fdcf
          VITE_AZURE_TENANT_ID: d13e89a2-46ab-48c5-ba97-7fdad1035704
          VITE_AZURE_REDIRECT_URI: https://admin.palletly.de
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: upload
          app_location: "admin/build/client"
          config_file_location: "admin/build/client"
          azure_static_web_apps_api_token: ${{ secrets.ADMIN_AZURE_STATIC_WEB_APPS_API_TOKEN }}
          skip_app_build: true
