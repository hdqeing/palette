name: Deploy API

on:
  workflow_dispatch:

env:
  IMAGE_NAME: dingqinghe/api
  JAVA_VERSION: "21"
  DOCKERHUB_USERNAME: dingqinghe

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build Spring Boot image
        working-directory: ./api
        run: |
          mvn spring-boot:build-image -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and push image
        run: |
          docker tag docker.io/dingqinghe/api:latest ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker tag docker.io/dingqinghe/api:latest ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest

      - name: Push image
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update container image
        run: |
          az webapp config container set \
            --name api-palette365 \
            --resource-group rg-palette365-dev \
            --container-image-name docker.io/${{ env.IMAGE_NAME }}:${{ github.sha }}