name: Customer UI

on:
  workflow_dispatch:

jobs:
  build_and_deploy_react_app:
    runs-on: ubuntu-latest
    name: Build React App and Deploy on Azure Static Web App
    defaults:
      run:
        working-directory: customer-ui
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: npm

      - name: Install dependencies
        run: npm ci
      
      - name: Build app
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: upload
          app_location: "dist"
          azure_static_web_apps_api_token: ${{ secret.CUSTOMER_UI_AZURE_STATIC_WEB_APPS_API_TOKEN }}
          skip_app_build: true
